version: "3.9"

services:
  # ─── PostgreSQL Database ─────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: voucher_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voucherdb}
      POSTGRES_USER: ${POSTGRES_USER:-voucheruser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voucherpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/config/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voucheruser} -d ${POSTGRES_DB:-voucherdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (Node.js / Express) ─────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: voucher_backend
    restart: unless-stopped
    working_dir: /workspace/backend
    volumes:
      - ./backend:/workspace/backend
      - backend_node_modules:/workspace/backend/node_modules
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-voucheruser}:${POSTGRES_PASSWORD:-voucherpass}@db:5432/${POSTGRES_DB:-voucherdb}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev

  # ─── Frontend (React) ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.frontend
    container_name: voucher_frontend
    restart: unless-stopped
    working_dir: /workspace/frontend
    volumes:
      - ./frontend:/workspace/frontend
      - frontend_node_modules:/workspace/frontend/node_modules
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend
    command: npm start

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
